version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    allow:
      - dependency-name: github.com/mymmrac/telego
    commit-message:
      prefix: chore
      include: scope
    labels:
      - chore
      - dependencies

  - package-ecosystem: gomod
    directory: /pkg/xk6
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    allow:
      - dependency-name: go.k6.io/k6
    commit-message:
      prefix: chore
      include: scope
    labels:
      - chore
      - dependencies

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    ignore:
      # actions/checkout v6 has a known "Duplicate header: Authorization"
      # bug breaking PR builds (actions/checkout#2299). Stay on v5 until fixed.
      - dependency-name: actions/checkout
        versions: [">= 6"]
    commit-message:
      prefix: ci
    labels:
      - ci
      - dependencies
