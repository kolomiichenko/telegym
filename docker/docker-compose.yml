name: telegym

services:
  telegym-mock:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: telegym-mock
    ports:
      - "5678:5678"   # Bot API + debug + HTMX chat
      - "9104:9104"   # Prometheus /metrics
    environment:
      TELEGYM_MOCK_LISTEN: ":5678"
      TELEGYM_MOCK_METRICS_LISTEN: ":9104"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.6.0
    container_name: telegym-prometheus
    ports:
      # Host port 9091 (not 9090) so this stack coexists with any Prometheus
      # the bot-under-test already runs on the default port.
      - "127.0.0.1:9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=24h'
      # Enable receiver for k6's remote-write output.
      - '--web.enable-remote-write-receiver'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    container_name: telegym-grafana
    ports:
      # Host port 3001 (not 3000) so this stack coexists with any Grafana
      # the bot-under-test already runs on the default port.
      - "127.0.0.1:3001:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: "/var/lib/grafana/dashboards/telegym.json"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
